<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Review Submissions - HERathon</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    const uStr = localStorage.getItem("user");
    if(!uStr) { window.location.href="index.html"; }
    else {
      const role = JSON.parse(uStr).role;
      if (role !== "mentor" && role !== "admin") {
        window.location.href = "dashboard.html";
      }
    }
  </script>
</head>
<body>
  <div class="app">
    <main style="padding: 2rem;">
      <h1>Review Submissions</h1>
      <p style="color:var(--text-muted); margin-bottom: 2rem;">Evaluate student projects and provide feedback.</p>
      
      <div id="submissionsContainer" style="display: flex; flex-direction: column; gap: 1rem;">
        <p>Loading submissions...</p>
      </div>
    </main>
  </div>

  <script src="shared-nav.js"></script>
  <script>
    const API_URL = "https://herathon-project-backend.vercel.app";

    async function loadReviewSubmissions() {
      const token = localStorage.getItem("token");
      const container = document.getElementById("submissionsContainer");
      
      try {
        const res = await fetch(`${API_URL}/submissions`, {
          headers: { "Authorization": `Bearer ${token}` }
        });
        
        const subs = await res.json();
        
        if (!subs || subs.length === 0) {
          container.innerHTML = `<div class="card" style="padding: 2rem; text-align: center;">No submissions available to review. Check back later!</div>`;
          return;
        }

        container.innerHTML = subs.map(s => {
          const studentName = (s.userId && s.userId.name) ? s.userId.name : "Unknown Student";
          const challengeTitle = (s.challengeId && s.challengeId.title) ? s.challengeId.title : "Unknown Challenge";
          const isPending = s.status === "pending";
          
          let badgeColor = "var(--text-muted)";
          if(s.status==="approved") badgeColor = "green";
          if(s.status==="rejected") badgeColor = "red";
          if(s.status==="pending") badgeColor = "#eab308";

          return `
            <div class="card" style="padding: 1.5rem; display: flex; justify-content: space-between; align-items: start;">
              <div>
                <h3 style="margin: 0; color:var(--text-main);">${challengeTitle}</h3>
                <p style="margin: 0.25rem 0; font-size: 0.9rem; color: var(--text-muted);">Submitted by: <strong>${studentName}</strong></p>
                <p style="margin: 0.5rem 0; font-size: 0.95rem;">${s.description || "No description provided."}</p>
                <a href="${s.projectUrl}" target="_blank" style="color:var(--primary); font-size:0.9rem;">View Project Link &rarr;</a>
              </div>
              <div style="text-align: right;">
                <span style="display:inline-block; margin-bottom:1rem; padding: 0.25rem 0.5rem; border-radius: var(--radius-sm); border: 1px solid ${badgeColor}; color: ${badgeColor}; font-weight: 600; font-size:0.8rem; text-transform:uppercase;">
                  ${s.status}
                </span>
                ${isPending ? `
                  <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                     <button class="btn-success" onclick="updateSubmissionStatus('${s._id}', 'approved')">✅ Approve</button>
                     <button class="btn-danger" style="background:transparent; border:1px solid #ef4444; color:#ef4444; cursor:pointer; padding:0.4rem 1rem; border-radius:var(--radius-sm); font-weight:600;" onclick="updateSubmissionStatus('${s._id}', 'rejected')">❌ Reject</button>
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        }).join("");

      } catch (err) {
        console.error(err);
        container.innerHTML = `<p style="color: red;">Failed to load submissions.</p>`;
      }
    }

    async function updateSubmissionStatus(id, status) {
      const token = localStorage.getItem("token");
      try {
        const res = await fetch(`${API_URL}/submissions/${id}`, {
          method: "PATCH",
          headers: { 
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ status })
        });
        
        if (res.ok) {
          loadReviewSubmissions();
        } else {
          alert("Failed to update status");
        }
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener("DOMContentLoaded", loadReviewSubmissions);
  </script>
</body>
</html>
